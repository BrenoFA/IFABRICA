<!DOCTYPE html>
<html lang="pt-BR">
<!-- BRENO FERREIRA AMORIM | 3º PERIODO | ADS -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estiloBase.css">
    <title>IFABRICA - 02</title>
</head>

<body>

    <!-- Cabeçalho principal da página. -->
    <header class="cabecalho">
        <h1>IFABRICA</h1>
    </header>

    <!-- Área principal do conteúdo da página. -->
    <main class="conteudo-principal">

        <!-- Saudações -->
        <section class="formulario-login">
            <h2>Página login</h2>
            <p>
                Esta página representa o início da estrutura visual do sistema que será usado
                para simular a fábrica de peças.
            </p>

            <!-- Campo de login -->
            <div class="grupo-campo">

                <!-- Área de cadastro do login -->
                <label for="text">Login: </label>
                <input type="text">

                <!-- Área de cadastro da senha -->
                <label for="">Senha: </label>
                <input type="password">
            </div>
            
            <!-- Botão que navega para a pagina principal. -->
            <div class="area-botao">
                <a href="principal.html" class="botao-cadastro">
                    Cadastrar usuário
                </a>
            </div>
        </section>
    </main>

    <!-- Rodapé simples da página. -->
    <footer class="rodape">
        <p>Programação II - IFRO.</p>
    </footer>

</body>

</html>
