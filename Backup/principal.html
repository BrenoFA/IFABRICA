<!--
Justificativas:

A fim de representar cada classe e seu respectivo sistema, foram escolhidos nomes que abordagem a ideia geral daquela classe.
O nome "Área Administrativa" representa a classe Pessoas. Pois aborda temas relacionados aos recursos humanos da fábrica, como dados 
pessoais de colaboradores, cargos e demais informações referentes aos responsáveis por manter o funcionamento da fábrica.

O nome "Produtos" representa a classe de mesmo nome. Essa aba encaminha o usuário do sistema para a gerência das peças que são fabricadas,
que neste caso são engrenagens.

O nome "Fabricação" representa a classe de mesmo nome. Essa aba encaminha o usuário para a gestão do chão de fábrica, a gestão das máquinas,
dos moldes e demais elementos presentes no cotidiano da produção.

O nome "Relatórios de Produtividade" representa a classe Processo de Fabricação. Essa aba encaminha o usuário para informações sobre
produções diárias na fábrica, os lotes, as identificações de cada produto, etc.

O nome "Relatórios de Insumos, Perdas e Custos" representa a classe Insumos, Perdas e Custos. Essa aba pode gerar relatórios importantes
para administração, a fim de identificar quando são necessários o pedido de mais insumos, os custos com perdas e demais intercorrências.

Acadêmico: Edson Henrique Gomes Rodrigues
-->
